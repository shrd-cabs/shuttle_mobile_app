# ===============================================================
# pubspec.yaml
# ---------------------------------------------------------------
# SHRD Mobile Application Configuration
#
# PURPOSE
# ---------------------------------------------------------------
# 1. Application information
# 2. Package dependencies
# 3. Development packages
# 4. Asset registration
# 5. App icon generation
# ===============================================================

name: shuttle_mobile_app

description: SHRD Shuttle Booking Mobile Application

publish_to: 'none'

version: 1.0.1

# ===============================================================
# Dart SDK Version
# ===============================================================

environment:
  sdk: ^3.12.1

# ===============================================================
# Application Dependencies
# ===============================================================

dependencies:

  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # API Calls
  http: ^1.2.1

  # Local Storage
  shared_preferences: ^2.5.3

  # Razorpay Payment Gateway
  razorpay_flutter: 1.4.1
  device_info_plus: ^13.2.0
  connectivity_plus: ^7.2.0
  package_info_plus: ^10.2.0

# ===============================================================
# Development Dependencies
# ===============================================================

dev_dependencies:

  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # App Icon Generator
  flutter_launcher_icons: ^0.14.4

# ===============================================================
# Flutter Configuration
# ===============================================================

flutter:

  uses-material-design: true

  assets:

    - assets/images/

    - assets/icons/

# ===============================================================
# Application Icon Configuration
# ---------------------------------------------------------------
# Standard icon:
# assets/images/logo.png
#
# Android adaptive foreground:
# assets/icons/shrd_icon_foreground.png
# ===============================================================

flutter_launcher_icons:

  android: true

  ios: true

  # Standard icon and fallback for older Android versions
  image_path: "assets/images/logo.png"

  # Android adaptive icon layers
  adaptive_icon_background: "#FFFFFF"

  adaptive_icon_foreground: "assets/icons/shrd_icon_foreground.png"

  # Adds safe padding around foreground artwork
  adaptive_icon_foreground_inset: 0

  # Removes transparency from generated iOS icons
  remove_alpha_ios: true